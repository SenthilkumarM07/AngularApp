
<div class="login-container">
    <div class="login-card">
     <h2>Login</h2>
     <form (ngSubmit)="UserLogin()" #loginForm="ngForm">

        <div class="form-group">

             <label>User ID</label>
             <input
             type="text"
             name="userId"
             placeholder="Enter User ID"
             [(ngModel)]="UserName"
             required
             #uid="ngModel"
             />

             <small *ngIf="uid.invalid && uid.touched">
                   User ID is required
             </small>
        </div>

        <div class="form-group">

             <label>Password</label>
             <input
             [type]="showPassword ? 'text' : 'password'"
             name="password"
             placeholder="Enter Password"
             [(ngModel)]="Password"
             required
             #pwd="ngModel"
             />
             <button type="button" (click)="togglePassword()" style="width: 50px; margin-left: 320px; ">
            {{ showPassword ? 'Hide' : 'Show' }}
            </button>

             <small *ngIf="pwd.invalid && pwd.touched">
                   Password is required
             </small>
        </div>
        <button type="submit" [disabled]="loginForm.invalid"> 
            Login
        </button>
     </form>
    </div>

</div>
